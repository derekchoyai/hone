name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sdk:
    name: SDK — typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: sdk/typescript
      - run: npm run typecheck
        working-directory: sdk/typescript
      - run: npm run build
        working-directory: sdk/typescript
      # The gold reference transcripts must stay math-consistent with the shipped SDK.
      - name: Gold-set math conformance
        run: node calibration/check-math.mjs

  mcp:
    name: MCP server — build & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: mcp
      - run: npm run build
        working-directory: mcp
      # Smoke test 1: the server must answer initialize + tools/list over stdio,
      # and score_review must return the deterministic AI-Q (spec/aiq.md):
      # D1-only equals discernment (v0.1 compat); D1+D2 renormalizes 2/3 + 1/3;
      # partial dimension groups are rejected, never guessed.
      - name: JSON-RPC smoke test
        working-directory: mcp
        run: |
          printf '%s\n%s\n%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"score_review","arguments":{"understanding":4,"verification":3,"assumptionAwareness":3,"riskRecognition":3,"confidenceCalibration":4,"accountability":3}}}' \
            '{"jsonrpc":"2.0","id":4,"method":"tools/call","params":{"name":"score_review","arguments":{"understanding":4,"verification":3,"assumptionAwareness":3,"riskRecognition":3,"confidenceCalibration":4,"accountability":3,"briefQuality":4,"taskSelection":4,"iterationControl":3}}}' \
            '{"jsonrpc":"2.0","id":5,"method":"tools/call","params":{"name":"score_review","arguments":{"understanding":4,"briefQuality":4}}}' \
            | HONE_HOME=$(mktemp -d) node dist/index.js | node -e '
              let buf = "";
              process.stdin.on("data", d => buf += d);
              process.stdin.on("end", () => {
                const msgs = buf.trim().split("\n").map(l => JSON.parse(l));
                const tools = msgs.find(m => m.id === 2).result.tools.map(t => t.name);
                for (const t of ["get_protocol", "score_review", "record_review", "get_profile"]) {
                  if (!tools.includes(t)) { console.error("missing tool:", t, "got:", tools); process.exit(1); }
                }
                const s3 = JSON.parse(msgs.find(m => m.id === 3).result.content[0].text);
                if (s3.composite !== 67 || s3.band !== "Mostly owns it" || s3.discernment !== 67) {
                  console.error("bad D1-only score:", s3); process.exit(1);
                }
                const s4 = JSON.parse(msgs.find(m => m.id === 4).result.content[0].text);
                if (s4.composite !== 69 || s4.discernment !== 67 || s4.delegation.score !== 73) {
                  console.error("bad AI-Q weighting:", s4); process.exit(1);
                }
                const s5 = JSON.parse(msgs.find(m => m.id === 5).result.content[0].text);
                if (!s5.error) { console.error("partial groups not rejected:", s5); process.exit(1); }
                console.log("smoke OK — tools:", tools.join(", "), "| D1-only:", s3.composite, "| AI-Q(D1+D2):", s4.composite);
              });
            '
      # Smoke test 2: local profile roundtrip — record persists across server
      # restarts, get_profile aggregates, get_protocol comes back personalized.
      # (Two invocations: a real client awaits each call; batched stdin replies
      # can arrive out of order, so state assertions use a fresh process.)
      - name: Profile roundtrip smoke test
        working-directory: mcp
        run: |
          export HONE_HOME=$(mktemp -d)
          REC='{"jsonrpc":"2.0","id":%d,"method":"tools/call","params":{"name":"record_review","arguments":{"domain":"strategy","understanding":4,"verification":%d,"assumptionAwareness":3,"riskRecognition":3,"confidenceCalibration":3,"accountability":4,"statedConfidence":80,"topGap":"Took the churn number on faith","subject":"Pricing memo %d"}}}'
          printf '%s\n%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            "$(printf "$REC" 2 2 1)" "$(printf "$REC" 3 1 2)" "$(printf "$REC" 4 2 3)" \
            | node dist/index.js > /dev/null
          printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"get_profile","arguments":{}}}' \
            '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"get_protocol","arguments":{"domain":"coding","riskLevel":"high"}}}' \
            | node dist/index.js | node -e '
              let buf = "";
              process.stdin.on("data", d => buf += d);
              process.stdin.on("end", () => {
                const msgs = buf.trim().split("\n").map(l => JSON.parse(l));
                const prof = JSON.parse(msgs.find(m => m.id === 2).result.content[0].text);
                if (prof.reviewCount !== 3 || prof.weakest !== "verification") {
                  console.error("bad profile:", prof); process.exit(1);
                }
                const proto = JSON.parse(msgs.find(m => m.id === 3).result.content[0].text);
                const per = proto.personalization;
                if (!per || !per.adaptiveFocus.includes("reference-class")) {
                  console.error("protocol not personalized:", per); process.exit(1);
                }
                const entry = require("fs").readFileSync(process.env.HONE_HOME + "/profile.json", "utf8");
                if (entry.includes("work map") || JSON.parse(entry).entries.some(e => "work" in e)) {
                  console.error("profile stored more than metadata"); process.exit(1);
                }
                console.log("profile OK — 3 reviews persisted, weakest:", prof.weakest, "| protocol personalized with reference-class");
              });
            '

  schemas:
    name: Spec — JSON schemas are valid
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate schema files parse and are JSON Schema
        run: |
          node -e '
            const fs = require("fs");
            for (const f of fs.readdirSync("spec").filter(f => f.endsWith(".schema.json"))) {
              const s = JSON.parse(fs.readFileSync("spec/" + f, "utf8"));
              if (!s.$schema) { console.error(f, "missing $schema"); process.exit(1); }
              console.log("ok:", f);
            }
          '
